services:

  # ── Backend (FastAPI + Uvicorn) ───────────────────────────────────────────
  - type: web
    name: nexradar-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORTFOLIO_REFRESH_INTERVAL
        value: "3.0"
      - key: MASSIVE_API_KEY
        sync: false          # set in Render dashboard
      - key: SUPABASE_URL
        sync: false          # set in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false          # set in Render dashboard
      - key: FRONTEND_ORIGIN
        value: https://nexradar.info

  # ── Frontend (React + Vite static site) ──────────────────────────────────
  - type: web
    name: nexradar-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://nexradar-backend.onrender.com
      #- key: VITE_WS_URL
       # value: wss://nexradar-backend.onrender.com/ws/live
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    domains:
      - nexradar.info
